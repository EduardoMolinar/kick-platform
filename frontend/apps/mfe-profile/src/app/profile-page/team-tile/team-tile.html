<ds-card variant="flat">
  <div class="team-tile__content">
    <div class="team-tile__info">
      <span class="team-tile__code">{{ team.shortName ?? team.name }}</span>
      <span class="team-tile__name">{{ team.name }}</span>
    </div>
    <button
      type="button"
      class="team-tile__unfollow"
      (click)="unfollow.emit()"
    >
      Remove
    </button>
  </div>
</ds-card>
