<div class="fixture-row">
  <time class="fixture-row__kickoff" [attr.datetime]="fixture.kickoffAt">
    {{ fixture.kickoffAt | date: 'EEE d MMM HH:mm' }}
  </time>
  <span class="fixture-row__home">{{ fixture.home.name }}</span>
  <span class="fixture-row__vs">vs</span>
  <span class="fixture-row__away">{{ fixture.away.name }}</span>
  @if (fixture.matchday !== undefined) {
    <span class="fixture-row__matchday">MD {{ fixture.matchday }}</span>
  }
</div>
