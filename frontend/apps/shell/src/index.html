<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pitch</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      // Prevent flash-of-incorrect-theme. Reads the persisted theme preference
      // from localStorage and resolves "system" to the OS preference, then sets
      // the data-theme attribute on <html> before any rendering. Defaults to
      // "dark" when no preference is stored or when storage is unavailable.
      (function () {
        try {
          var key = 'pitch-theme';
          var stored = localStorage.getItem(key);
          var mode =
            stored === 'dark' || stored === 'light' || stored === 'system'
              ? stored
              : 'dark';
          var resolved =
            mode === 'system'
              ? matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
