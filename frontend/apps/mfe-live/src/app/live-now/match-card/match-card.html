<a
  [class]="cardClasses"
  [routerLink]="['/live', match.id]"
  [attr.aria-label]="'Match: ' + match.home.team.name + ' vs ' + match.away.team.name"
>
  <header class="match-card__header">
    <span class="match-card__competition">{{ match.competition.code }}</span>
    <span class="match-card__status">
      @if (isLive) {
        <span class="match-card__pulse"></span>
      }
      {{ statusLabel }}
    </span>
  </header>

  <div class="match-card__teams">
    <div class="match-card__row">
      <span class="match-card__team-name">{{ match.home.team.name }}</span>
      <button
        type="button"
        class="match-card__follow"
        [class.match-card__follow--active]="homeFollowing"
        [attr.aria-pressed]="homeFollowing"
        (click)="onFollowClick($event, homeFollowToggle)"
      >{{ homeFollowing ? 'Following' : 'Follow' }}</button>
      <span
        class="match-card__score"
        [class.match-card__score--leading]="match.home.score > match.away.score"
      >{{ match.home.score }}</span>
    </div>
    <div class="match-card__row">
      <span class="match-card__team-name">{{ match.away.team.name }}</span>
      <button
        type="button"
        class="match-card__follow"
        [class.match-card__follow--active]="awayFollowing"
        [attr.aria-pressed]="awayFollowing"
        (click)="onFollowClick($event, awayFollowToggle)"
      >{{ awayFollowing ? 'Following' : 'Follow' }}</button>
      <span
        class="match-card__score"
        [class.match-card__score--leading]="match.away.score > match.home.score"
      >{{ match.away.score }}</span>
    </div>
  </div>
</a>
