<section class="live-now">
  <header class="live-now__header">
    <h1 class="live-now__title">Live now</h1>
  </header>

  @if (vm$ | async; as vm) {
    @if (vm.matches.length > 0) {
      <ds-list>
        @for (item of vm.matches; track item.match.id) {
          <ds-list-item>
            <mfe-live-match-card
              [match]="item.match"
              [homeFollowing]="item.homeFollowing"
              [awayFollowing]="item.awayFollowing"
              (homeFollowToggle)="onFollowToggle(vm.user, item.match.home.team, item.homeFollowing)"
              (awayFollowToggle)="onFollowToggle(vm.user, item.match.away.team, item.awayFollowing)"
            />
          </ds-list-item>
        }
      </ds-list>
    } @else {
      <p class="live-now__empty">No matches in progress.</p>
    }
  }
</section>
