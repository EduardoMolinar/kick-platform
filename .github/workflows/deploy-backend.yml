name: Deploy backend (sports-proxy)

on:
  push:
    branches: [main]
    paths:
      - 'backend/sports-proxy/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/sports-proxy/requirements-dev.txt

      - name: Install backend dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/sports-proxy/requirements-dev.txt

      - name: Lint backend (ruff)
        working-directory: backend/sports-proxy
        run: ruff check src/ tests/

      - name: Test backend (pytest)
        working-directory: backend/sports-proxy
        run: pytest tests/ -q

      - name: Set up Node 20 (CDK)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK deps
        working-directory: infra
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: CDK synth
        working-directory: infra
        run: npx cdk synth --quiet

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --require-approval=never --outputs-file cdk-outputs.json

      - name: Surface deployed API URL
        if: success()
        working-directory: infra
        run: |
          echo "::notice::Deployed API URL — copy into frontend/apps/shell/src/environments/environment.prod.ts and push to redeploy the frontend."
          cat cdk-outputs.json
