# _deploy-remote.yml
#
# Reusable workflow. Called by each remote's release workflow.
# Builds one remote, syncs its browser/ output to the stable S3 path
# /remotes/<remote-name>/, then invalidates CloudFront in two passes:
#
#   Pass 1 — cache-sensitive (no-hash) files:
#     /remotes/<remote-name>/remoteEntry.json
#
#   Pass 2 — hashed assets (longer TTL, but still flushed on a new release
#             so users don't serve stale shared chunks):
#     /remotes/<remote-name>/*
#
# Rollback: re-run the workflow on the previous release tag.
# Only this remote's CloudFront paths are touched; shell and other remotes
# are unaffected.

name: Deploy Remote (reusable)

on:
  workflow_call:
    inputs:
      remote:
        description: "Nx project name of the remote to build and deploy (e.g. mfe-home)"
        required: true
        type: string
      ref:
        description: "Git ref to deploy (tag, branch, or SHA)"
        required: false
        type: string
        default: ""

env:
  NODE_VERSION: "24"

jobs:
  build-and-deploy:
    name: Build and deploy ${{ inputs.remote }}
    runs-on: ubuntu-latest

    # Pulls AWS_ROLE_ARN, S3_BUCKET, and CLOUDFRONT_DISTRIBUTION_ID from the
    # `prod` GitHub environment's secret store. Declared here (not on the
    # calling job) because `environment:` is not a valid key on a job that
    # calls a reusable workflow.
    environment: prod

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build remote
        run: |
          npx nx build ${{ inputs.remote }} --configuration=production

      # Artifact lives at dist/frontend/apps/<remote>/browser/
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync hashed assets (long-TTL, immutable)
        run: |
          aws s3 sync \
            dist/frontend/apps/${{ inputs.remote }}/browser/ \
            s3://${{ secrets.S3_BUCKET }}/remotes/${{ inputs.remote }}/ \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "remoteEntry.json" \
            --delete

      - name: Upload remoteEntry.json (short-TTL, cache-busted)
        run: |
          aws s3 cp \
            dist/frontend/apps/${{ inputs.remote }}/browser/remoteEntry.json \
            s3://${{ secrets.S3_BUCKET }}/remotes/${{ inputs.remote }}/remoteEntry.json \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "application/json"

      # Invalidate remoteEntry.json first (smallest blast radius, near-instant for shell picks up)
      - name: Invalidate remoteEntry.json
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/remotes/${{ inputs.remote }}/remoteEntry.json"

      # Invalidate hashed assets so returning users get new chunks
      - name: Invalidate remote assets
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/remotes/${{ inputs.remote }}/*"
