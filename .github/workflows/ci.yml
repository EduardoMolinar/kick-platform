# ci.yml
#
# Runs on every PR targeting main.
# Uses nx affected to scope lint, test, and build to only the changed projects.
# Does NOT deploy anything. Deployment is handled by the release-* workflows.
#
# Artifacts built here are discarded after the job. They exist only to validate
# that affected projects build cleanly before merge.

name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  NX_BASE: origin/main
  NX_HEAD: HEAD

jobs:
  affected-lint-test-build:
    name: Affected lint / test / build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Derive affected projects
        run: |
          npx nx affected -t lint,test,build \
            --base=${{ env.NX_BASE }} \
            --head=${{ env.NX_HEAD }} \
            --parallel=4 \
            --configuration=production
